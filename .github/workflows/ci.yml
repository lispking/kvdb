name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        zig-version: ['0.15.2']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ matrix.zig-version }}

      - name: Check formatting
        run: zig fmt --check src/ examples/
        shell: bash

      - name: Build project
        run: zig build
        shell: bash

      - name: Run tests
        run: zig build test
        shell: bash

      - name: Build in release mode
        run: zig build -Doptimize=ReleaseFast
        shell: bash

  lint:
    name: Lint and Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ matrix.zig-version }}

      - name: Check formatting
        run: zig fmt --check src/ examples/

      - name: Build with strict settings
        run: zig build -Dtarget=native-native-gnu

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ matrix.zig-version }}

      - name: Run tests with coverage
        run: |
          zig test src/kvdb.zig -femit-bin=/dev/null -ODebug --test-runner \.\zig-cache 2>&1 | tee test_output.txt
        shell: bash
        continue-on-error: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test_output.txt
          retention-days: 7
