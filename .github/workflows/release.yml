name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux-gnu
            arch: x86_64-linux
          - os: ubuntu-latest
            target: aarch64-linux-gnu
            arch: aarch64-linux
          - os: macos-latest
            target: aarch64-macos
            arch: aarch64-macos
          - os: macos-latest
            target: x86_64-macos
            arch: x86_64-macos
          - os: windows-latest
            target: x86_64-windows-gnu
            arch: x86_64-windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure Git line endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
        shell: bash

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: '0.15.2'

      - name: Build
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}
        shell: bash

      - name: Package (Versioned)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p kvdb-${{ github.ref_name }}-${{ matrix.arch }}
          cp zig-out/lib/* kvdb-${{ github.ref_name }}-${{ matrix.arch }}/ 2>/dev/null || true
          cp zig-out/bin/kvdb-cli kvdb-${{ github.ref_name }}-${{ matrix.arch }}/ 2>/dev/null || true
          cp README.md LICENSE kvdb-${{ github.ref_name }}-${{ matrix.arch }}/ 2>/dev/null || true
          tar czvf kvdb-${{ github.ref_name }}-${{ matrix.arch }}.tar.gz kvdb-${{ github.ref_name }}-${{ matrix.arch }}
        shell: bash

      - name: Package (Versioned Windows)
        if: matrix.os == 'windows-latest'
        run: |
          New-Item -ItemType Directory -Force -Path "kvdb-${{ github.ref_name }}-${{ matrix.arch }}"
          Copy-Item zig-out/lib/* "kvdb-${{ github.ref_name }}-${{ matrix.arch }}/" -ErrorAction SilentlyContinue
          Copy-Item zig-out/bin/kvdb-cli.exe "kvdb-${{ github.ref_name }}-${{ matrix.arch }}/" -ErrorAction SilentlyContinue
          Copy-Item README.md "kvdb-${{ github.ref_name }}-${{ matrix.arch }}/" -ErrorAction SilentlyContinue
          Copy-Item LICENSE "kvdb-${{ github.ref_name }}-${{ matrix.arch }}/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "kvdb-${{ github.ref_name }}-${{ matrix.arch }}" -DestinationPath "kvdb-${{ github.ref_name }}-${{ matrix.arch }}.zip" -Force
        shell: pwsh

      - name: Package (Latest)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p kvdb-latest-${{ matrix.arch }}
          cp zig-out/lib/* kvdb-latest-${{ matrix.arch }}/ 2>/dev/null || true
          cp zig-out/bin/kvdb-cli kvdb-latest-${{ matrix.arch }}/ 2>/dev/null || true
          cp README.md LICENSE kvdb-latest-${{ matrix.arch }}/ 2>/dev/null || true
          tar czvf kvdb-latest-${{ matrix.arch }}.tar.gz kvdb-latest-${{ matrix.arch }}
        shell: bash

      - name: Package (Latest Windows)
        if: matrix.os == 'windows-latest'
        run: |
          New-Item -ItemType Directory -Force -Path "kvdb-latest-${{ matrix.arch }}"
          Copy-Item zig-out/lib/* "kvdb-latest-${{ matrix.arch }}/" -ErrorAction SilentlyContinue
          Copy-Item zig-out/bin/kvdb-cli.exe "kvdb-latest-${{ matrix.arch }}/" -ErrorAction SilentlyContinue
          Copy-Item README.md "kvdb-latest-${{ matrix.arch }}/" -ErrorAction SilentlyContinue
          Copy-Item LICENSE "kvdb-latest-${{ matrix.arch }}/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "kvdb-latest-${{ matrix.arch }}" -DestinationPath "kvdb-latest-${{ matrix.arch }}.zip" -Force
        shell: pwsh

      - name: Upload versioned artifacts
        uses: actions/upload-artifact@v6
        with:
          name: kvdb-${{ github.ref_name }}-${{ matrix.arch }}
          path: |
            kvdb-${{ github.ref_name }}-*.tar.gz
            kvdb-${{ github.ref_name }}-*.zip
          retention-days: 7

      - name: Upload latest artifacts
        uses: actions/upload-artifact@v6
        with:
          name: kvdb-latest-${{ matrix.arch }}
          path: |
            kvdb-latest-*.tar.gz
            kvdb-latest-*.zip
          retention-days: 7

  create-release:
    name: Create Release
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download versioned artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/version
          merge-multiple: true
          pattern: kvdb-${{ github.ref_name }}-*

      - name: Download latest artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/latest
          merge-multiple: true
          pattern: kvdb-latest-*

      - name: List artifacts
        run: |
          echo "=== Versioned artifacts ==="
          ls -la artifacts/version/
          echo "=== Latest artifacts ==="
          ls -la artifacts/latest/

      - name: Create Versioned Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: artifacts/version/kvdb-${{ github.ref_name }}-*.tar.gz,artifacts/version/kvdb-${{ github.ref_name }}-*.zip
          generate_release_notes: true
          body: |
            ## KVDB ${{ github.ref_name }}

            ### Installation

            Download the appropriate archive for your platform and extract it:

            **Linux/macOS:**
            ```bash
            tar xzvf kvdb-${{ github.ref_name }}-<arch>.tar.gz
            cd kvdb-${{ github.ref_name }}-<arch>
            ./kvdb-cli --help
            ```

            **Windows:**
            ```powershell
            Expand-Archive kvdb-${{ github.ref_name }}-<arch>.zip
            cd kvdb-${{ github.ref_name }}-<arch>
            .\kvdb-cli.exe --help
            ```

            ### Available Builds

            | Platform | Architecture | File |
            |----------|--------------|------|
            | Linux | x86_64 | `kvdb-${{ github.ref_name }}-x86_64-linux.tar.gz` |
            | Linux | ARM64 | `kvdb-${{ github.ref_name }}-aarch64-linux.tar.gz` |
            | macOS | x86_64 | `kvdb-${{ github.ref_name }}-x86_64-macos.tar.gz` |
            | macOS | Apple Silicon | `kvdb-${{ github.ref_name }}-aarch64-macos.tar.gz` |
            | Windows | x86_64 | `kvdb-${{ github.ref_name }}-x86_64-windows.zip` |

            ### Quick Start

            ```bash
            # Create a database
            ./kvdb-cli my.db put name "KVDB"
            ./kvdb-cli my.db put version "${{ github.ref_name }}"

            # Query data
            ./kvdb-cli my.db get name
            ./kvdb-cli my.db list
            ```

            ### Verification

            All binaries are built automatically from the tagged source code using GitHub Actions.
            Check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for build logs.

      - name: Update Latest Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Delete existing latest release if exists
          gh release delete latest --yes 2>/dev/null || true
          sleep 2
          # Create new latest release pointing to this tag
          gh release create latest \
            --title "Latest" \
            --notes "Latest stable release (${{ github.ref_name }}). Download the versioned release for checksums and release notes." \
            --target ${{ github.sha }} \
            artifacts/latest/kvdb-latest-*
