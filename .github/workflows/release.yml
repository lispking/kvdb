name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux-gnu
            arch: x86_64-linux
          - os: ubuntu-latest
            target: aarch64-linux-gnu
            arch: aarch64-linux
          - os: macos-latest
            target: aarch64-macos
            arch: aarch64-macos
          - os: macos-latest
            target: x86_64-macos
            arch: x86_64-macos
          - os: windows-latest
            target: x86_64-windows-gnu
            arch: x86_64-windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure Git line endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
        shell: bash

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: '0.15.2'

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="latest"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}
        shell: bash

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p kvdb-${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}
          cp zig-out/lib/* kvdb-${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}/ 2>/dev/null || true
          cp zig-out/bin/kvdb-cli kvdb-${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}/ 2>/dev/null || cp zig-out/bin/kvdb-cli.exe kvdb-${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}/ 2>/dev/null || true
          cp README.md LICENSE kvdb-${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}/ 2>/dev/null || true
          tar czvf kvdb-${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}.tar.gz kvdb-${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}
        shell: bash

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          New-Item -ItemType Directory -Force -Path "kvdb-${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}"
          Copy-Item zig-out/lib/* "kvdb-${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}/" -ErrorAction SilentlyContinue
          Copy-Item zig-out/bin/kvdb-cli.exe "kvdb-${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}/" -ErrorAction SilentlyContinue
          Copy-Item README.md "kvdb-${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}/" -ErrorAction SilentlyContinue
          Copy-Item LICENSE "kvdb-${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "kvdb-${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}" -DestinationPath "kvdb-${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}.zip" -Force
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: kvdb-${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}
          path: |
            kvdb-*.tar.gz
            kvdb-*.zip
          retention-days: 7

  create-release:
    name: Create Release
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
            IS_LATEST="false"
          else
            VERSION="latest"
            IS_LATEST="true"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "IS_LATEST=$IS_LATEST" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Is Latest: $IS_LATEST"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
          pattern: kvdb-${{ steps.version.outputs.VERSION }}-*

      - name: List artifacts
        run: ls -la artifacts/

      - name: Delete existing latest release
        if: steps.version.outputs.IS_LATEST == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Delete existing latest tag and release if they exist
          gh release delete latest --yes 2>/dev/null || true
          git push --delete origin latest 2>/dev/null || true
          # Create new latest tag pointing to current commit
          git tag -fa latest -m "Latest build from main"
          git push -f origin latest

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.IS_LATEST == 'true' && 'Latest' || format('Release {0}', steps.version.outputs.VERSION) }}
          tag_name: ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ steps.version.outputs.IS_LATEST == 'true' }}
          files: artifacts/kvdb-*
          generate_release_notes: ${{ steps.version.outputs.IS_LATEST != 'true' }}
          body: |
            ## KVDB ${{ steps.version.outputs.VERSION }}

            ${{ steps.version.outputs.IS_LATEST == 'true' && 'This is the latest development build from the main branch. It may contain unstable features.' || '' }}

            ### Installation

            Download the appropriate archive for your platform and extract it:

            **Linux/macOS:**
            ```bash
            tar xzvf kvdb-${{ steps.version.outputs.VERSION }}-<arch>.tar.gz
            cd kvdb-${{ steps.version.outputs.VERSION }}-<arch>
            ./kvdb-cli --help
            ```

            **Windows:**
            ```powershell
            Expand-Archive kvdb-${{ steps.version.outputs.VERSION }}-<arch>.zip
            cd kvdb-${{ steps.version.outputs.VERSION }}-<arch>
            .\kvdb-cli.exe --help
            ```

            ### Available Builds

            | Platform | Architecture | File |
            |----------|--------------|------|
            | Linux | x86_64 | `kvdb-${{ steps.version.outputs.VERSION }}-x86_64-linux.tar.gz` |
            | Linux | ARM64 | `kvdb-${{ steps.version.outputs.VERSION }}-aarch64-linux.tar.gz` |
            | macOS | x86_64 | `kvdb-${{ steps.version.outputs.VERSION }}-x86_64-macos.tar.gz` |
            | macOS | Apple Silicon | `kvdb-${{ steps.version.outputs.VERSION }}-aarch64-macos.tar.gz` |
            | Windows | x86_64 | `kvdb-${{ steps.version.outputs.VERSION }}-x86_64-windows.zip` |

            ### Quick Start

            ```bash
            # Create a database
            ./kvdb-cli my.db put name "KVDB"
            ./kvdb-cli my.db put version "${{ steps.version.outputs.VERSION }}"

            # Query data
            ./kvdb-cli my.db get name
            ./kvdb-cli my.db list
            ```

            ${{ steps.version.outputs.IS_LATEST == 'true' && '' || format('### Verification

            All binaries are built automatically from the tagged source code using GitHub Actions.
            Check the [workflow run](https://github.com/{0}/actions/runs/{1}) for build logs.', github.repository, github.run_id) }}
